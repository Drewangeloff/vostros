steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'deploy/Dockerfile'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bird/vostros:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/bird/vostros:latest'
      - '.'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bird/vostros:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/bird/vostros:latest'
