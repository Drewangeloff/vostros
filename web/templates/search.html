<div class="search-form">
    <input type="search"
           name="q"
           class="search-input"
           placeholder="Search posts and users..."
           value="{{.Data.Query}}"
           hx-get="/htmx/search"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#search-results"
           hx-include="this"
           autofocus>
</div>

<div id="search-results">
    {{if .Data.Query}}
        {{template "search_results.html" (map "Query" .Data.Query "Posts" .Data.Results "Users" .Data.Users "NextCursor" .NextCursor "TimelineURL" (print "/htmx/search?q=" .Data.Query))}}
    {{else}}
        <div class="empty-state">
            <p>Search for posts or users</p>
        </div>
    {{end}}
</div>
