<div class="home">
    <div class="hero">
        <h1>What's happening?</h1>
        <p>Vostros is a simple, chronological timeline. No algorithms. No ads. Just posts.</p>
        <div class="hero-actions">
            <a href="/register" class="btn btn-primary">Sign Up</a>
            <a href="/login" class="btn btn-secondary">Login</a>
        </div>
    </div>
    <div class="section">
        <h2>Global Timeline</h2>
        {{template "tweet_list.html" (map "Tweets" .Data "NextCursor" .NextCursor "TimelineURL" "/htmx/global")}}
    </div>
</div>
