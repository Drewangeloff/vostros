<div class="new-token-banner" id="new-token-banner">
    <div class="new-token-warning">
        <strong>Save this token now — you won't be able to see it again!</strong>
    </div>
    <div class="new-token-display">
        <code id="token-plaintext">{{.Token}}</code>
        <button type="button" class="btn btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('token-plaintext').textContent).then(function(){showToast('Token copied to clipboard','success')})">Copy</button>
    </div>
</div>
<div class="token-row" id="token-{{.TokenID}}">
    <div class="token-info">
        <strong>{{.TokenName}}</strong>
        <code>{{.Prefix}}...</code>
        <span class="token-meta">Created just now</span>
    </div>
    <button class="btn btn-danger btn-sm"
            hx-delete="/developers/tokens/{{.TokenID}}"
            hx-target="#token-{{.TokenID}}"
            hx-swap="outerHTML"
            hx-confirm="Delete token '{{.TokenName}}'?">Delete</button>
</div>
