<div class="post-list">
    {{if .Posts}}
        {{range .Posts}}
            {{template "post.html" .}}
        {{end}}
        {{if .NextCursor}}
        <div hx-get="{{.TimelineURL}}?cursor={{.NextCursor}}"
             hx-trigger="revealed"
             hx-swap="outerHTML"
             class="loading-more">
            Loading more...
        </div>
        {{end}}
    {{else}}
        <div class="empty-state">
            <p>No posts yet. Be the first!</p>
        </div>
    {{end}}
</div>
